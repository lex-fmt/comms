name: Deploy to GitHub Pages

on:
  push:
    branches: [main, feat/mkdocs-conversion]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install MkDocs and plugins
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-lex-plugin

      - name: Install pinned lexd binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LEXD_VERSION=$(jq -r '.lexd' shared/lex-deps.json)
          LEXD_REPO=$(jq -r '."lexd-repo"' shared/lex-deps.json)
          LEXD_TARGET="x86_64-unknown-linux-gnu"
          LEXD_TMP="$(mktemp -d)"
          gh release download "${LEXD_VERSION}" \
            --repo "${LEXD_REPO}" \
            --pattern "lexd-${LEXD_TARGET}.tar.gz" \
            --dir "${LEXD_TMP}"
          tar -xzf "${LEXD_TMP}/lexd-${LEXD_TARGET}.tar.gz" -C "${LEXD_TMP}"
          mkdir -p "${HOME}/.local/bin"
          mv "$(find "${LEXD_TMP}" -type f -name lexd | head -n 1)" "${HOME}/.local/bin/lexd"
          chmod +x "${HOME}/.local/bin/lexd"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Verify lexd
        run: lexd --version

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with MkDocs
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
