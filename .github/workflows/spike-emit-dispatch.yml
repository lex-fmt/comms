# Spike: emit a repository_dispatch event to a downstream repo.
#
# Layer 2 (event-driven cascade) of the cross-repo release automation —
# see lex-fmt/lex#640. This workflow is a deliberate spike: it fires the
# event mechanism in isolation, with no real release work, so we can
# validate cross-repo dispatch (RELEASE_TOKEN permissions, event_type
# matching, payload integrity, latency) before wiring it into the real
# release.yml.
#
# To use:
#   gh workflow run spike-emit-dispatch.yml --repo lex-fmt/comms
# then check the receiver:
#   gh run list --repo lex-fmt/tree-sitter-lex --workflow=spike-receive-dispatch.yml
#
# This workflow + the matching `spike-receive-dispatch.yml` in
# tree-sitter-lex are scaffolding. They get deleted (or repurposed as a
# smoke-test path) once the real handler workflows land.
name: Spike — emit repository_dispatch

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Downstream repo (owner/name) to dispatch into'
        required: false
        default: 'lex-fmt/tree-sitter-lex'
        type: string
      event_type:
        description: 'event_type for repository_dispatch'
        required: false
        default: 'spike-cascade'
        type: string

permissions:
  contents: read

jobs:
  emit:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch
        env:
          # RELEASE_TOKEN: a classic PAT with `repo + read:org`. The
          # default GITHUB_TOKEN cannot fire repos/<other>/dispatches
          # across repos, even within the same org — silent 403. The
          # PAT is propagated to every onboarded repo via
          # `install-release-token` (arthur-debert/release tooling).
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TARGET: ${{ inputs.target_repo }}
          EVENT_TYPE: ${{ inputs.event_type }}
        run: |
          set -euo pipefail
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Firing $EVENT_TYPE to $TARGET at $TS"
          gh api "repos/$TARGET/dispatches" --method POST \
            -f event_type="$EVENT_TYPE" \
            -F client_payload[source]=comms \
            -F client_payload[version]=v0.16.2 \
            -F client_payload[ts]="$TS" \
            -F client_payload[run_url]="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          echo "Dispatch fired. Check the receiver:"
          echo "  gh run list --repo $TARGET --workflow=spike-receive-dispatch.yml"
