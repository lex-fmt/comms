name: Release

# Thin caller — the canonical interpreted-repo release pipeline lives at
# arthur-debert/release/.github/workflows/gh-action.yml@v3.
#
# comms is a docs-site / interpreted repo: no build, no crates. The
# pipeline tags + pushes HEAD and cuts a GitHub Release whose notes are
# rolled from the CHANGELOG/ fragment directory at cut. Bug fixes to the
# pipeline arrive via the @v3 floating ref; nothing to change here.
#
# Migrated from the old hand-rolled tag-push workflow (2026-06): the
# fleet release tooling (release-core cut) now launches releases via
# `workflow_dispatch`, so a push-tag trigger is no longer dispatchable.
# The previous specs.tar.gz / assets.tar.gz release assets were dropped
# because nothing consumes them — every downstream pulls comms via the
# git submodule, not via release tarballs. The `upstream-released`
# downstream-notify step was also dropped: the push-cascade it served
# has been retired in favour of consumers pulling.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.19.2 or 1.0.0-rc.1). No leading v.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: arthur-debert/release/.github/workflows/gh-action.yml@v3
    with:
      version: ${{ inputs.version }}
      # comms ships no root action.yml — skip the manifest sanity check.
      action-manifest: ''
      # Roll CHANGELOG/unreleased-*.md fragments into CHANGELOG/<version>.md
      # at cut and use that version body as the GitHub Release notes.
      changelog-path: CHANGELOG.md
    secrets:
      # Unblocks the ruleset-protected default-branch changelog commit and
      # the floating-major branch force-push. Falls back to GITHUB_TOKEN.
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
