name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release notes from tag annotation
        id: notes
        run: |
          BODY=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create specs archive
        run: |
          tar -czf specs.tar.gz specs/

      - name: Create assets archive
        run: |
          tar -czf assets.tar.gz assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            specs.tar.gz
            assets.tar.gz
          body: ${{ steps.notes.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
